<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Open Road Registry</title>
</head>
<body>

<h1>Open Road Registry</h1>
<div id="list"></div>

<script>
function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Math.random().toString(36).substring(2);
    params.callback=cb;
    const s=document.createElement("script");
    window[cb]=(data)=>{delete window[cb];document.head.removeChild(s);resolve(data)};
    s.onerror=()=>reject("error");
    s.src="https://script.google.com/macros/s/AKfycbyKsX9eQCM8G7xgtmuv2I0-g3Hm-Qpk2uRdLUdRVk3G3nJrKY_9S68aTaAOLZxpJ3p7fw/exec"+new URLSearchParams(params);
    document.head.appendChild(s);
  });
}

async function load(){
  const j=await jsonp({action:"search"});
  const div=document.getElementById("list");
  if(!j.ok){div.innerText=j.error;return;}
  div.innerHTML=j.items.map(c=>"<div><a href='club.html?id="+c.club_id+"'>"+c.name+"</a></div>").join("");
}
load();
</script>

</body>
</html>
