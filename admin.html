<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Open Road Registry - Admin</title>
<style>
body{font-family:Arial;margin:24px;max-width:900px}
.card{border:1px solid #ddd;padding:16px;border-radius:10px;margin:12px 0}
button{padding:8px 12px;margin-top:10px}
input,select,textarea{width:100%;padding:8px;margin-top:6px}
.ok{color:green}
.bad{color:red}
</style>
</head>
<body>

<h1>Open Road Registry - Admin</h1>

<div class="card">
<label>https://script.google.com/macros/s/AKfycbyKsX9eQCM8G7xgtmuv2I0-g3Hm-Qpk2uRdLUdRVk3G3nJrKY_9S68aTaAOLZxpJ3p7fw/exec</label>
<input id="apiBase">
</div>

<div class="card">
<h2>Register</h2>
<input id="regName" placeholder="Club Name">
<input id="regFounded" placeholder="2026-01-01">
<input id="regPresUuid" placeholder="President UUID">
<input id="regPresName" placeholder="President Name">
<button onclick="register()">Register</button>
<div id="regOut"></div>
</div>

<div class="card">
<h2>Verify</h2>
<input id="clubId" placeholder="Club ID">
<input id="token" placeholder="Token">
<input id="challengeCode" placeholder="Challenge Code">
<button onclick="confirm()">Confirm</button>
<div id="verOut"></div>
</div>

<script>
function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Math.random().toString(36).substring(2);
    params.callback=cb;
    const s=document.createElement("script");
    window[cb]=(data)=>{delete window[cb];document.head.removeChild(s);resolve(data)};
    s.onerror=()=>reject("error");
    s.src=document.getElementById("apiBase").value+"?"+new URLSearchParams(params);
    document.head.appendChild(s);
  });
}

async function register(){
  const out=document.getElementById("regOut");
  const j=await jsonp({
    action:"register",
    name:regName.value,
    founded_date:regFounded.value,
    president_uuid:regPresUuid.value,
    president_name:regPresName.value
  });
  if(!j.ok) out.innerHTML="<span class=bad>"+j.error+"</span>";
  else{
    out.innerHTML="<span class=ok>Registered "+j.club_id+"</span>";
    clubId.value=j.club_id;
    token.value=j.token;
    challengeCode.value=j.challenge;
  }
}

async function confirm(){
  const out=document.getElementById("verOut");
  const j=await jsonp({
    action:"confirm",
    club_id:clubId.value,
    token:token.value,
    president_uuid:regPresUuid.value,
    challenge_code:challengeCode.value
  });
  if(!j.ok) out.innerHTML="<span class=bad>"+j.error+"</span>";
  else out.innerHTML="<span class=ok>Verified</span>";
}
</script>

</body>
</html>
