<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Club</title>
</head>
<body>

<div id="club"></div>

<script>
function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Math.random().toString(36).substring(2);
    params.callback=cb;
    const s=document.createElement("script");
    window[cb]=(data)=>{delete window[cb];document.head.removeChild(s);resolve(data)};
    s.onerror=()=>reject("error");
    s.src="PASTE_YOUR_WEBAPP_URL?"+new URLSearchParams(params);
    document.head.appendChild(s);
  });
}

async function load(){
  const id=new URLSearchParams(location.search).get("id");
  const j=await jsonp({action:"club",club_id:id});
  const div=document.getElementById("club");
  if(!j.ok){div.innerText=j.error;return;}
  const c=j.club;
  div.innerHTML="<h1>"+c.name+"</h1><p>Status: "+c.status+"</p><p>"+c.description+"</p>";
}
load();
</script>

</body>
</html>
